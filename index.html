<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DUELO — Termo Online</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --panel: #141418;
    --border: #2a2a32;
    --text: #f0ede8;
    --muted: #666672;
    --green: #4caf78;
    --yellow: #d4a843;
    --red: #e05a5a;
    --blue: #5a9ee0;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    width:100%; padding:14px 20px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--border);
    background:rgba(13,13,15,0.95); backdrop-filter:blur(12px);
    position:sticky; top:0; z-index:100;
  }
  .logo { font-family:'Black Han Sans',sans-serif; font-size:1.5rem; letter-spacing:4px; }
  .logo span { color:var(--red); }
  .score-bar { display:flex; gap:16px; align-items:center; }
  .score-pill { display:flex; flex-direction:column; align-items:center; gap:2px; }
  .score-pill .label { font-size:.55rem; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }
  .score-pill .val { font-family:'Black Han Sans',sans-serif; font-size:1.3rem; line-height:1; }
  .score-pill.p1 .val { color:var(--blue); }
  .score-pill.p2 .val { color:var(--red); }
  .score-divider { font-size:.8rem; color:var(--muted); }

  /* ── SCREENS ── */
  .screen { display:none; flex-direction:column; align-items:center; width:100%; flex:1; }
  .screen.active { display:flex; }

  /* ── LOBBY ── */
  #screen-lobby {
    justify-content:center; gap:32px;
    padding:40px 24px; max-width:440px; margin:0 auto;
    animation: fadeIn .4s ease;
  }
  .lobby-title { text-align:center; }
  .lobby-title h1 { font-family:'Black Han Sans',sans-serif; font-size:3rem; letter-spacing:6px; }
  .lobby-title p { color:var(--muted); font-size:.7rem; letter-spacing:3px; margin-top:8px; text-transform:uppercase; }
  .lobby-tabs { display:flex; width:100%; border:1px solid var(--border); }
  .tab-btn {
    flex:1; padding:12px; background:transparent; border:none;
    color:var(--muted); font-family:'Space Mono',monospace; font-size:.7rem;
    letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:all .2s;
  }
  .tab-btn.active { background:var(--panel); color:var(--text); }
  .tab-btn:first-child { border-right:1px solid var(--border); }
  .tab-content { display:none; width:100%; flex-direction:column; gap:14px; }
  .tab-content.active { display:flex; }
  .field { display:flex; flex-direction:column; gap:6px; }
  .field label { font-size:.6rem; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }
  .field input {
    background:var(--panel); border:1px solid var(--border); color:var(--text);
    font-family:'Space Mono',monospace; font-size:.9rem; padding:12px 14px;
    outline:none; text-transform:uppercase; letter-spacing:2px; transition:border-color .2s;
    width:100%;
  }
  .field input:focus { border-color:var(--text); }
  .field input::placeholder { color:var(--muted); text-transform:none; }
  .note { font-size:.65rem; letter-spacing:1.5px; color:var(--muted); line-height:1.7; }
  .note em { color:var(--yellow); font-style:normal; }
  .btn-primary {
    background:var(--text); border:none; color:var(--bg);
    font-family:'Black Han Sans',sans-serif; font-size:1rem; letter-spacing:4px;
    padding:15px; cursor:pointer; text-transform:uppercase;
    transition:opacity .2s, transform .1s; width:100%;
  }
  .btn-primary:hover { opacity:.9; }
  .btn-primary:active { transform:scale(.98); }
  .btn-secondary {
    background:transparent; border:1px solid var(--border); color:var(--muted);
    font-family:'Space Mono',monospace; font-size:.7rem; letter-spacing:2px;
    padding:12px; cursor:pointer; text-transform:uppercase; transition:all .2s; width:100%;
  }
  .btn-secondary:hover { border-color:var(--text); color:var(--text); }

  /* ── WAITING ── */
  #screen-waiting {
    justify-content:center; gap:28px; padding:40px 24px; max-width:420px; margin:0 auto;
    animation:fadeIn .4s ease;
  }
  .room-code-box { text-align:center; }
  .room-code-box p { font-size:.65rem; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:12px; }
  .room-code {
    font-family:'Black Han Sans',sans-serif; font-size:3.5rem; letter-spacing:10px;
    color:var(--blue); border:2px solid var(--blue); padding:16px 28px;
    display:inline-block;
  }
  .waiting-note { font-size:.7rem; letter-spacing:2px; color:var(--muted); text-align:center; line-height:1.8; }
  .waiting-note em { color:var(--text); font-style:normal; }
  .dots-anim::after { content:''; animation:dots 1.5s infinite; }
  @keyframes dots {
    0%   { content:''; }
    33%  { content:'.'; }
    66%  { content:'..'; }
    100% { content:'...'; }
  }
  .pulse-dot {
    width:10px; height:10px; border-radius:50%; background:var(--yellow);
    box-shadow:0 0 10px var(--yellow);
    animation:pulse 1.2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }
  .waiting-flex { display:flex; align-items:center; justify-content:center; gap:12px; }

  /* ── GAME ── */
  #screen-game {
    padding:16px 12px 100px; gap:16px;
    align-items:center;
    animation:fadeIn .3s ease;
  }
  .turn-banner {
    display:flex; align-items:center; gap:10px;
    padding:8px 20px; border:1px solid var(--border);
    font-size:.7rem; letter-spacing:3px; text-transform:uppercase; color:var(--muted);
    transition:all .3s;
  }
  .turn-banner .dot { width:7px; height:7px; border-radius:50%; background:var(--muted); transition:background .3s; }
  .turn-banner.my-turn { border-color:var(--green); color:var(--green); }
  .turn-banner.my-turn .dot { background:var(--green); box-shadow:0 0 8px var(--green); }
  .turn-banner.opp-turn { border-color:var(--muted); color:var(--muted); }

  .grid { display:flex; flex-direction:column; gap:5px; }
  .row { display:flex; gap:5px; }
  .cell {
    width:58px; height:58px;
    border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    font-family:'Black Han Sans',sans-serif; font-size:1.6rem;
    color:var(--text); background:var(--panel);
    transition:border-color .15s, background .3s;
  }
  .cell.active-row { border-color:#444450; }
  .cell.filled { border-color:#555562; }
  .cell.correct { background:var(--green); border-color:var(--green); color:#fff; }
  .cell.present { background:var(--yellow); border-color:var(--yellow); color:#fff; }
  .cell.absent  { background:#333340; border-color:#333340; color:#888; }
  .cell.flip { animation:flip .5s ease forwards; }

  @keyframes flip  { 0%{transform:rotateX(0)} 50%{transform:rotateX(-90deg);background:var(--panel)} 100%{transform:rotateX(0)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .row.shake { animation:shake .4s ease; }

  .message { font-size:.7rem; letter-spacing:2px; color:var(--muted); min-height:18px; text-align:center; text-transform:uppercase; }
  .message.error { color:var(--red); }

  /* ── KEYBOARD ── */
  .keyboard { display:flex; flex-direction:column; align-items:center; gap:6px; width:100%; max-width:400px; }
  .kb-row { display:flex; gap:5px; justify-content:center; }
  .key {
    background:#28282f; border:none; color:var(--text);
    font-family:'Space Mono',monospace; font-size:.7rem; font-weight:700;
    padding:13px 8px; min-width:32px; cursor:pointer;
    text-transform:uppercase; letter-spacing:1px;
    transition:background .15s, transform .08s; border-radius:2px;
  }
  .key.wide { min-width:50px; font-size:.6rem; }
  .key.correct { background:var(--green); color:#fff; }
  .key.present { background:var(--yellow); color:#fff; }
  .key.absent  { background:#1e1e24; color:var(--muted); }

  /* ── OPPONENT STATUS ── */
  .opp-status { display:flex; align-items:center; gap:10px; padding:8px 16px; border:1px solid var(--border); font-size:.65rem; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }
  .opp-guesses { display:flex; gap:4px; }
  .opp-pip { width:8px; height:8px; background:var(--border); border-radius:50%; }
  .opp-pip.used { background:var(--muted); }
  .opp-pip.won  { background:var(--green); }
  .opp-pip.lost { background:var(--red); }

  /* ── OVERLAY ── */
  #overlay { position:fixed; inset:0; background:rgba(13,13,15,.88); backdrop-filter:blur(16px); z-index:200; display:none; align-items:center; justify-content:center; }
  #overlay.visible { display:flex; }
  .result-card { background:var(--panel); border:1px solid var(--border); padding:40px 48px; text-align:center; max-width:380px; width:92%; display:flex; flex-direction:column; gap:20px; }
  .result-card h2 { font-family:'Black Han Sans',sans-serif; font-size:1.8rem; letter-spacing:4px; }
  .word-reveal { font-family:'Black Han Sans',sans-serif; font-size:1.4rem; letter-spacing:6px; color:var(--green); }

  #error-banner { position:fixed; top:60px; left:50%; transform:translateX(-50%); background:var(--red); color:#fff; padding:8px 20px; font-size:.65rem; letter-spacing:2px; text-transform:uppercase; z-index:300; display:none; }
  #error-banner.show { display:block; }
</style>
</head>
<body>

<header>
  <div class="logo">DUE<span>L</span>O</div>
  <div class="score-bar">
    <div class="score-pill p1"><span class="label" id="hdr-p1-name">P1</span><span class="val" id="hdr-p1-score">0</span></div>
    <span class="score-divider">×</span>
    <div class="score-pill p2"><span class="label" id="hdr-p2-name">P2</span><span class="val" id="hdr-p2-score">0</span></div>
  </div>
</header>

<div id="error-banner"></div>

<div id="screen-lobby" class="screen active">
  <div class="lobby-title"><h1>DUELO</h1><p>Termo Online · 2 Jogadores</p></div>
  <div class="lobby-tabs">
    <button class="tab-btn active" onclick="switchTab('create')">CRIAR SALA</button>
    <button class="tab-btn" onclick="switchTab('join')">ENTRAR</button>
  </div>
  <div id="tab-create" class="tab-content active">
    <div class="field"><label>Seu nome</label><input id="create-name" type="text" maxlength="12" placeholder="Ex: JOAO"></div>
    <div class="field"><label>Palavra secreta (opcional)</label><input id="create-secret" type="text" maxlength="5" placeholder="deixe vazio para aleatória"></div>
    <p class="note">Se preencher a palavra, <em>você não joga</em> — apenas o adversário.</p>
    <button class="btn-primary" onclick="createRoom()">CRIAR SALA</button>
  </div>
  <div id="tab-join" class="tab-content">
    <div class="field"><label>Seu nome</label><input id="join-name" type="text" maxlength="12" placeholder="Ex: MARIA"></div>
    <div class="field"><label>Código da sala</label><input id="join-code" type="text" maxlength="6" placeholder="Ex: AB3X" style="text-align:center;"></div>
    <button class="btn-primary" onclick="joinRoom()">ENTRAR NA SALA</button>
  </div>
</div>

<div id="screen-waiting" class="screen">
  <div class="room-code-box"><p>Código da sala</p><div class="room-code" id="display-room-code">????</div></div>
  <p class="waiting-note">Mande o código ao adversário 👆</p>
  <div class="waiting-flex"><div class="pulse-dot"></div><span class="waiting-note">Aguardando adversário<span class="dots-anim"></span></span></div>
  <button class="btn-secondary" onclick="location.reload()">CANCELAR</button>
</div>

<div id="screen-game" class="screen">
  <div class="turn-banner" id="turn-banner"><div class="dot"></div><span id="turn-text">—</span></div>
  <div class="opp-status"><span id="opp-status-name">?</span>: <div class="opp-guesses" id="opp-pips"></div></div>
  <div class="grid" id="my-grid"></div>
  <div class="message" id="msg"></div>
  <div class="keyboard">
    <div class="kb-row" id="kb-1"></div>
    <div class="kb-row" id="kb-2"></div>
    <div class="kb-row" id="kb-3"></div>
  </div>
</div>

<div id="overlay">
  <div class="result-card">
    <h2 id="result-title">—</h2>
    <div class="word-reveal" id="result-word">—</div>
    <button class="btn-primary" onclick="location.reload()">NOVO JOGO</button>
  </div>
</div>

<script>
const WORDS = ["ABRIR","ACASO","AJUDA","AMIGO","ANTES","AREIA","BANCO","BEIJO","CAMPO","CHAVE","CLARO","COISA","CORTE","FESTA","FORTE","IDEIA","JOGAR","LIVRE","MUNDO","NOITE","ORDEM","PEDRA","PONTO","SAUDE","TEMPO","TEXTO","VALOR","VERDE"];
const POLL_INTERVAL = 1500;
let me = { role: null, roomCode: '', name: '', isObserver: false };
let game = { secret: '', guesses: [], current: '', done: false, won: false, keyHints: {} };
let scores = { p1: 0, p2: 0 };
let pollTimer = null;

// Storage
async function sGet(k) { try { const r = await window.storage.get(k, true); return r ? JSON.parse(r.value) : null; } catch { return null; } }
async function sSet(k, v) { try { await window.storage.set(k, JSON.stringify(v), true); } catch(e) {} }

function switchTab(t) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&t==='create')||(i===1&&t==='join')));
  document.getElementById('tab-create').classList.toggle('active', t==='create');
  document.getElementById('tab-join').classList.toggle('active', t==='join');
}

async function createRoom() {
  const name = document.getElementById('create-name').value.trim().toUpperCase() || 'P1';
  let secret = document.getElementById('create-secret').value.trim().toUpperCase();
  const isObs = secret.length === 5;
  if (!secret) secret = WORDS[Math.floor(Math.random()*WORDS.length)];
  
  const code = Math.random().toString(36).substring(2,6).toUpperCase();
  me = { role: 'p1', roomCode: code, name, isObserver: isObs };
  
  const data = { code, secret, p1: { name, guesses: [], done: false }, p2: null, phase: 'waiting' };
  await sSet('room:' + code, data);
  document.getElementById('display-room-code').textContent = code;
  showScreen('waiting');
  startPolling();
}

async function joinRoom() {
  const name = document.getElementById('join-name').value.trim().toUpperCase() || 'P2';
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  const data = await sGet('room:' + code);
  if (!data || data.p2) { showError('Sala inválida ou cheia'); return; }

  me = { role: 'p2', roomCode: code, name, isObserver: false };
  data.p2 = { name, guesses: [], done: false };
  data.phase = 'playing';
  await sSet('room:' + code, data);
  initGame(data);
}

function startPolling() { stopPolling(); pollTimer = setInterval(poll, POLL_INTERVAL); }
function stopPolling() { if (pollTimer) clearInterval(pollTimer); }

async function poll() {
  const data = await sGet('room:' + me.roomCode);
  if (!data) return;

  // Se eu sou o P1 e estava esperando, e o P2 entrou
  if (me.role === 'p1' && document.getElementById('screen-waiting').classList.contains('active')) {
    if (data.p2) { stopPolling(); initGame(data); return; }
  }

  if (document.getElementById('screen-game').classList.contains('active')) {
    updateOppStatus(data);
    if (data.phase === 'ended') { stopPolling(); showResult(data); }
  }
}

function initGame(data) {
  game = { secret: data.secret, guesses: [], current: '', done: false, won: false, keyHints: {} };
  document.getElementById('hdr-p1-name').textContent = data.p1.name;
  document.getElementById('hdr-p2-name').textContent = data.p2 ? data.p2.name : '...';
  buildGrid();
  buildKeyboard();
  updateTurnBanner();
  showScreen('game');
  startPolling();
}

function buildGrid() {
  const g = document.getElementById('my-grid'); g.innerHTML = '';
  for (let r=0; r<6; r++) {
    const row = document.createElement('div'); row.className = 'row'; row.id = 'row-'+r;
    for (let c=0; c<5; c++) {
      const cell = document.createElement('div'); cell.className = 'cell'; cell.id = `cell-${r}-${c}`;
      row.appendChild(cell);
    }
    g.appendChild(row);
  }
  highlightRow();
}

function buildKeyboard() {
  const rows = [["Q","W","E","R","T","Y","U","I","O","P"],["A","S","D","F","G","H","J","K","L"],["ENTER","Z","X","C","V","B","N","M","⌫"]];
  rows.forEach((r, i) => {
    const container = document.getElementById('kb-' + (i+1)); container.innerHTML = '';
    r.forEach(key => {
      const btn = document.createElement('button'); btn.className = 'key' + (key.length > 1 ? ' wide' : '');
      btn.textContent = key;
      btn.onclick = () => handleInput(key);
      container.appendChild(btn);
    });
  });
}

function handleInput(key) {
  if (me.isObserver || game.done) return;
  if (key === '⌫') game.current = game.current.slice(0, -1);
  else if (key === 'ENTER') submit();
  else if (game.current.length < 5 && /^[A-Z]$/.test(key)) game.current += key;
  renderInput();
}

function renderInput() {
  const row = game.guesses.length;
  for (let c=0; c<5; c++) {
    const cell = document.getElementById(`cell-${row}-${c}`);
    cell.textContent = game.current[c] || '';
    cell.classList.toggle('filled', !!game.current[c]);
  }
}

async function submit() {
  if (game.current.length < 5) return;
  const guess = game.current; game.guesses.push(guess); game.current = '';
  const result = evalGuess(guess, game.secret);
  
  const rowIdx = game.guesses.length - 1;
  for (let c=0; c<5; c++) {
    const cell = document.getElementById(`cell-${rowIdx}-${c}`);
    cell.className = `cell flip ${result[c]}`;
  }

  if (guess === game.secret) { game.done = true; game.won = true; }
  else if (game.guesses.length >= 6) { game.done = true; game.won = false; }

  const data = await sGet('room:' + me.roomCode);
  data[me.role].guesses = game.guesses;
  data[me.role].done = game.done;
  data[me.role].won = game.won;
  
  if (data.p1.done && data.p2.done) data.phase = 'ended';
  await sSet('room:' + me.roomCode, data);
  
  updateTurnBanner();
  highlightRow();
}

function evalGuess(g, s) {
  const res = Array(5).fill('absent');
  const sArr = s.split(''), used = Array(5).fill(false);
  for (let i=0; i<5; i++) if (g[i]===sArr[i]) { res[i]='correct'; used[i]=true; }
  for (let i=0; i<5; i++) {
    if (res[i]==='correct') continue;
    for (let j=0; j<5; j++) if (!used[j] && g[i]===sArr[j]) { res[i]='present'; used[j]=true; break; }
  }
  return res;
}

function highlightRow() {
  document.querySelectorAll('.cell').forEach(c => c.classList.remove('active-row'));
  if (!game.done && !me.isObserver) {
    const r = document.getElementById('row-' + game.guesses.length);
    if (r) r.querySelectorAll('.cell').forEach(c => c.classList.add('active-row'));
  }
}

function updateTurnBanner() {
  const txt = document.getElementById('turn-text');
  if (me.isObserver) txt.textContent = "MODO ESPECTADOR";
  else if (game.done) txt.textContent = game.won ? "VOCÊ ACERTOU!" : "VOCÊ PERDEU!";
  else txt.textContent = "SUA VEZ";
}

function updateOppStatus(data) {
  const opp = me.role === 'p1' ? data.p2 : data.p1;
  if (!opp) return;
  document.getElementById('opp-status-name').textContent = opp.name;
  const pips = document.getElementById('opp-pips'); pips.innerHTML = '';
  for (let i=0; i<6; i++) {
    const p = document.createElement('div'); p.className = 'opp-pip';
    if (i < opp.guesses.length) p.classList.add('used');
    if (opp.done && opp.won && i === opp.guesses.length-1) p.classList.add('won');
    pips.appendChild(p);
  }
}

function showResult(data) {
  document.getElementById('result-word').textContent = data.secret;
  document.getElementById('result-title').textContent = (data.p1.won || data.p2.won) ? "FIM DE DUELO" : "NINGUÉM ACERTOU";
  document.getElementById('overlay').classList.add('visible');
}

function showScreen(n) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + n).classList.add('active');
}

function showError(m) {
  const b = document.getElementById('error-banner'); b.textContent = m; b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), 3000);
}
</script>
</body>
</html>
