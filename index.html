<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DUELO — Termo Online</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --panel: #141418;
    --border: #2a2a32;
    --text: #f0ede8;
    --muted: #666672;
    --green: #4caf78;
    --yellow: #d4a843;
    --red: #e05a5a;
    --blue: #5a9ee0;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  header {
    width:100%; padding:14px 20px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--border);
    background:rgba(13,13,15,0.95); backdrop-filter:blur(12px);
    position:sticky; top:0; z-index:100;
  }
  .logo { font-family:'Black Han Sans',sans-serif; font-size:1.5rem; letter-spacing:4px; }
  .logo span { color:var(--red); }
  .score-bar { display:flex; gap:16px; align-items:center; }
  .score-pill { display:flex; flex-direction:column; align-items:center; gap:2px; }
  .score-pill .label { font-size:.55rem; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }
  .score-pill .val { font-family:'Black Han Sans',sans-serif; font-size:1.3rem; line-height:1; }
  .score-pill.p1 .val { color:var(--blue); }
  .score-pill.p2 .val { color:var(--red); }
  .score-divider { font-size:.8rem; color:var(--muted); }

  .screen { display:none; flex-direction:column; align-items:center; width:100%; flex:1; }
  .screen.active { display:flex; }

  #screen-lobby {
    justify-content:center; gap:32px;
    padding:40px 24px; max-width:440px; margin:0 auto;
    animation: fadeIn .4s ease;
  }
  .lobby-title { text-align:center; }
  .lobby-title h1 { font-family:'Black Han Sans',sans-serif; font-size:3rem; letter-spacing:6px; }
  .lobby-tabs { display:flex; width:100%; border:1px solid var(--border); }
  .tab-btn {
    flex:1; padding:12px; background:transparent; border:none;
    color:var(--muted); font-family:'Space Mono',monospace; font-size:.7rem;
    letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:all .2s;
  }
  .tab-btn.active { background:var(--panel); color:var(--text); }
  .field { display:flex; flex-direction:column; gap:6px; }
  .field label { font-size:.6rem; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }
  .field input {
    background:var(--panel); border:1px solid var(--border); color:var(--text);
    font-family:'Space Mono',monospace; font-size:.9rem; padding:12px 14px;
    outline:none; text-transform:uppercase; letter-spacing:2px; width:100%;
  }
  .btn-primary {
    background:var(--text); border:none; color:var(--bg);
    font-family:'Black Han Sans',sans-serif; font-size:1rem; letter-spacing:4px;
    padding:15px; cursor:pointer; text-transform:uppercase; width:100%;
  }

  #screen-waiting { justify-content:center; gap:28px; padding:40px 24px; animation:fadeIn .4s ease; }
  .room-code {
    font-family:'Black Han Sans',sans-serif; font-size:3.5rem; letter-spacing:10px;
    color:var(--blue); border:2px solid var(--blue); padding:16px 28px;
  }

  #screen-game { padding:16px 12px 100px; gap:16px; align-items:center; }
  .grid { display:flex; flex-direction:column; gap:5px; }
  .row { display:flex; gap:5px; }
  .cell {
    width:58px; height:58px; border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    font-family:'Black Han Sans',sans-serif; font-size:1.6rem;
    color:var(--text); background:var(--panel); transition: all 0.3s;
  }
  .cell.correct { background:var(--green); border-color:var(--green); }
  .cell.present { background:var(--yellow); border-color:var(--yellow); }
  .cell.absent  { background:#333340; border-color:#333340; color:#888; }

  .keyboard { display:flex; flex-direction:column; align-items:center; gap:6px; width:100%; }
  .kb-row { display:flex; gap:5px; }
  .key {
    background:#28282f; border:none; color:var(--text);
    padding:13px 8px; min-width:32px; cursor:pointer; font-weight:700;
  }
  .key.correct { background:var(--green); }
  .key.present { background:var(--yellow); }
  .key.absent { background:#1e1e24; color:var(--muted); }

  #error-banner {
    position:fixed; top:60px; left:50%; transform:translateX(-50%);
    background:var(--red); color:#fff; padding:8px 20px; z-index:300; display:none;
  }
  #error-banner.show { display:block; }
</style>
</head>
<body>

<header>
  <div class="logo">DUE<span>L</span>O</div>
  <div class="score-bar">
    <div class="score-pill p1"><span class="label" id="hdr-p1-name">P1</span><span class="val" id="hdr-p1-score">0</span></div>
    <span class="score-divider">×</span>
    <div class="score-pill p2"><span class="label" id="hdr-p2-name">P2</span><span class="val" id="hdr-p2-score">0</span></div>
  </div>
</header>

<div id="error-banner"></div>

<div id="screen-lobby" class="screen active">
  <div class="lobby-tabs">
    <button class="tab-btn active" onclick="switchTab('create')">CRIAR SALA</button>
    <button class="tab-btn" onclick="switchTab('join')">ENTRAR</button>
  </div>
  <div id="tab-create" class="tab-content active">
    <div class="field"><label>Seu nome</label><input id="create-name" type="text" maxlength="12"></div>
    <div class="field"><label>Palavra (opcional)</label><input id="create-secret" type="text" maxlength="5"></div>
    <button class="btn-primary" onclick="createRoom()">CRIAR SALA</button>
  </div>
  <div id="tab-join" class="tab-content">
    <div class="field"><label>Seu nome</label><input id="join-name" type="text" maxlength="12"></div>
    <div class="field"><label>Código</label><input id="join-code" type="text" maxlength="4"></div>
    <button class="btn-primary" onclick="joinRoom()">ENTRAR</button>
  </div>
</div>

<div id="screen-waiting" class="screen">
  <div class="room-code" id="display-room-code">????</div>
  <p>Aguardando adversário...</p>
</div>

<div id="screen-game" class="screen">
    <div id="turn-banner" class="turn-banner">Sua Vez</div>
    <div class="grid" id="my-grid"></div>
    <div class="message" id="msg"></div>
    <div class="keyboard" id="kb">
        </div>
</div>

<script>
const WORDS = ["ABRIR","ACASO","AMIGO","AREIA","AULAS","BAIXO","BANCO","BEIJO","BRAVO","CAIXA","CALOR","CAMPO","CHAVE","CLARO","COISA","COMER","CORTE","CRIAR","DOCES","EXAME","FALAR","FELIZ","FESTA","FILHO","FORTE","GERAL","GOSTO","IDEIA","JOGAR","LEGAL","LIVRE","LUGAR","MESMO","MUNDO","NOITE","ORDEM","OUTRO","PAPEL","PARAR","PODER","PONTO","PORTA","PROVA","QUEDA","SAIDA","SAUDE","SONHO","SORTE","TARDE","TEMPO","TEXTO","UNIAO","VALOR","VERDE","VISTA","VITAL"];

let me = { role: null, name: '', roomCode: '', isObserver: false };
let game = { secret: '', guesses: [], current: '', done: false };
let pollTimer = null;

async function storageGet(key) {
  const r = await window.storage.get(key, true);
  return r ? JSON.parse(r.value) : null;
}
async function storageSet(key, val) {
  await window.storage.set(key, JSON.stringify(val), true);
}

function switchTab(t) {
  document.getElementById('tab-create').classList.toggle('active', t==='create');
  document.getElementById('tab-join').classList.toggle('active', t==='join');
}

async function createRoom() {
  const name = document.getElementById('create-name').value.trim().toUpperCase() || 'P1';
  let secret = document.getElementById('create-secret').value.trim().toUpperCase();
  const isObserver = secret.length === 5;
  if (!isObserver) secret = WORDS[Math.floor(Math.random() * WORDS.length)];

  const vCode = Math.random().toString(36).substring(2, 6).toUpperCase();
  me = { role: 'p1', name, roomCode: vCode, isObserver };

  const roomData = {
    code: vCode,
    secret,
    p1: { name, guesses: [], done: false },
    p2: null,
    phase: 'waiting'
  };

  await storageSet('room:' + vCode, roomData);
  document.getElementById('display-room-code').textContent = vCode;
  showScreen('waiting');
  startPolling();
}

async function joinRoom() {
  const name = document.getElementById('join-name').value.trim().toUpperCase() || 'P2';
  const vCode = document.getElementById('join-code').value.trim().toUpperCase();
  
  let roomData = await storageGet('room:' + vCode);
  if (!roomData) { showError('Sala não encontrada'); return; }

  me = { role: 'p2', name, roomCode: vCode, isObserver: false };
  roomData.p2 = { name, guesses: [], done: false };
  roomData.phase = 'playing';
  
  await storageSet('room:' + vCode, roomData);
  initGame(roomData);
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    const roomData = await storageGet('room:' + me.roomCode);
    if (!roomData) return;

    if (me.role === 'p1' && roomData.phase === 'playing' && document.getElementById('screen-waiting').classList.contains('active')) {
      initGame(roomData);
    }
  }, 1500);
}

function initGame(roomData) {
  game.secret = roomData.secret;
  document.getElementById('hdr-p1-name').textContent = roomData.p1.name;
  document.getElementById('hdr-p2-name').textContent = roomData.p2.name;
  showScreen('game');
  buildGrid();
  buildKeyboard();
}

function buildGrid() {
  const g = document.getElementById('my-grid'); g.innerHTML = '';
  for (let r=0; r<6; r++) {
    const row = document.createElement('div'); row.className = 'row';
    for (let c=0; c<5; c++) {
      const cell = document.createElement('div'); cell.className = 'cell';
      cell.id = `cell-${r}-${c}`; row.appendChild(cell);
    }
    g.appendChild(row);
  }
}

function buildKeyboard() {
    const keys = [["Q","W","E","R","T","Y","U","I","O","P"],["A","S","D","F","G","H","J","K","L"],["ENTER","Z","X","C","V","B","N","M","⌫"]];
    const kb = document.getElementById('kb'); kb.innerHTML = '';
    keys.forEach(row => {
        const r = document.createElement('div'); r.className = 'kb-row';
        row.forEach(k => {
            const btn = document.createElement('button'); btn.className = 'key';
            btn.textContent = k; btn.onclick = () => handleInput(k);
            r.appendChild(btn);
        });
        kb.appendChild(r);
    });
}

function handleInput(k) {
    if (game.done || me.isObserver) return;
    const row = game.guesses.length;
    if (k === "⌫") {
        game.current = game.current.slice(0, -1);
    } else if (k === "ENTER") {
        if (game.current.length === 5) submitGuess();
    } else if (game.current.length < 5) {
        game.current += k;
    }
    renderRow(row);
}

function renderRow(r) {
    for (let c=0; c<5; c++) {
        const cell = document.getElementById(`cell-${r}-${c}`);
        cell.textContent = game.current[c] || "";
    }
}

async function submitGuess() {
    const guess = game.current;
    const result = evaluate(guess, game.secret);
    const row = game.guesses.length;
    
    game.guesses.push(guess);
    game.current = "";

    for (let c=0; c<5; c++) {
        const cell = document.getElementById(`cell-${row}-${c}`);
        cell.classList.add(result[c]);
    }

    if (guess === game.secret || game.guesses.length === 6) game.done = true;
}

function evaluate(g, s) {
    const res = Array(5).fill('absent');
    const sArr = s.split('');
    g.split('').forEach((l, i) => { if (l === s[i]) { res[i] = 'correct'; sArr[i] = null; }});
    g.split('').forEach((l, i) => { 
        if (res[i] !== 'correct' && sArr.includes(l)) { 
            res[i] = 'present'; sArr[sArr.indexOf(l)] = null; 
        }
    });
    return res;
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

function showError(msg) {
  const b = document.getElementById('error-banner');
  b.textContent = msg; b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), 3000);
}
</script>
</body>
</html>
